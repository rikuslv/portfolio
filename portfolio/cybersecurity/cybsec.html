<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cybersecurity</title>

  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
  <link rel="stylesheet" href="navigation.css?v=99">
  <link rel="stylesheet" href="visual.css">
  <link rel="shortcut icon" type="image/x-icon" href="logo.png">

  <style>
    #admin-panel {
    display: none; 
}
    .lightbox {
      display: none;
      position: fixed;
      z-index: 9999;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0, 0, 0, 0.9);
      justify-content: center;
      align-items: center;
      cursor: zoom-out;
    }
    .lightbox img {
      max-width: 90%;
      max-height: 90%;
      border: 2px solid #00bcd4;
      box-shadow: 0 0 20px rgba(0, 188, 212, 0.5);
    }
    .portfolio-img {
      cursor: zoom-in;
    }
    /* Admin paneļa stils, lai tas neizbojātu kopējo dizainu */
    #admin-panel input, #admin-panel textarea {
      background: #2c3e50;
      border: 1px solid #00bcd4;
      color: white;
      padding: 8px;
    }
  </style>
</head>

<body>

<nav class="navbar">
  <span class="material-symbols-outlined menu-icon" onclick="toggleMenu()">menu</span>
  <div class="nav-links" id="navLinks">
    <a href="../../index.html">Home</a>
    <a href="../../about/about.html">About</a>
    <a href="../../news/news.html">News</a>
    <a href="../portfolio.html">Portfolio</a>
    <a href="../../contact/contact.html">Contact</a>
  </div>
</nav>

<div class="tasks" id="sidebar-links">
  <div class="hl"></div>
  <h2 class="sidebar-title">Cybersecurity</h2>
  <div class="hl2"></div>
  <div class="vl"></div>
</div>

<div class="content-container" id="portfolio-root"></div>

<div id="lightbox" class="lightbox" onclick="this.style.display='none'">
  <img id="lightbox-img" src="" alt="Zoomed view">
</div>

<hr style="margin-top: 100px; border: 1px solid #35495e;">
<div id="admin-panel" style="padding: 50px; background: #1a252f;">
  <h3 style="color: #00bcd4;">Add New Portfolio Item (Auto-Push to GitHub)</h3>
  <input type="text" id="new-title" placeholder="Project Title" style="display:block; margin:10px 0; width:300px;">
  <input type="text" id="new-id" placeholder="Project ID (unique, no spaces)" style="display:block; margin:10px 0; width:300px;">
  <input type="text" id="new-img" placeholder="Image Filename (e.g., test.png)" style="display:block; margin:10px 0; width:300px;">
  <textarea id="new-desc" placeholder="English Description (HTML allowed)" style="display:block; margin:10px 0; width:300px; height:100px;"></textarea>
  <button onclick="saveToGitHub()" style="padding:10px 20px; background:#00bcd4; color:white; border:none; cursor:pointer; font-weight:bold;">Upload to GitHub</button>
  <p id="status" style="margin-top: 10px; color: #00bcd4;"></p>
</div>

<script>
  function toggleMenu() {
    const navLinks = document.getElementById("navLinks");
    navLinks.classList.toggle("active");
  }

  const darbi = [
    {
      id: "bandit",
      title: "Bandit",
      img: "bandit.png",
      desc: `What is a Bandit?<br><br>
             Bandit is a game that, like most other games, is organized in levels. You start at Level 0 and try to “beat” or “finish” it.
             <br>Finishing a level results in information on how to start the next level.
             <br><a href="https://overthewire.org/wargames/bandit/" target="_blank">(Full description).</a><br><br>
             In this game, I got to <a href="https://docs.google.com/document/d/1jq_MTlrP-0r-AsPq3DgGgPLFU7Yc3fTxr7Q77fCjDSo/edit?usp=sharing" target="_blank">level 16</a>.`
    },
    {
      id: "practice",
      title: "Practice",
      img: "seb.png",
      desc: `I practice in SEB Bank, where I filled practice tasks:<br><br>
             1. Creation of ICT resources/network infrastructure documentation;<br>
             2. Familiarization with ICT security architecture and processes;<br>
             3. Technical tools (firewalls, IPS, IDS, etc.);<br>
             4. Security policy, usage rules, and related documentation;<br>
             5. Monitoring user activity;<br>
             6. Classification of system users;<br>
             7. Network/system management tools used in the organization.`
    },
    {
      id: "evilbox",
      title: "EVILBOX: ONE",
      img: "evilbox.png",
      desc: `EVILBOX: ONE is a cybersecurity Capture The Flag (CTF) competition platform.
             In this task, the objective is to obtain both the user flag and the root flag.
             (<a href="https://drive.google.com/file/d/1FdqM9bw7eqV5HDgHGl1gEvHjP3TdKfkW/view?usp=sharing" target="_blank">report</a>)`
    },
    {
      id: "kiberplesis",
      title: "Kiberplēsis",
      img: "kiberplesis.png",
      desc: `The "Kiberplēsis" competition is organized by CYBER CIRCLE.
             I achieved 360 points in the Kiberplēsis 2025 CTF competition, placing 80th.`
    },
    {
      id: "jangow",
      title: "Jangow: 1.0.1",
      img: "jangow.png",
      desc: `Jangow: 1.0.1 is a vulnerable virtual machine designed for security testing and learning penetration testing techniques.`
    }
  ];

  function renderPortfolio() {
    const container = document.getElementById('portfolio-root');
    const sidebar = document.getElementById('sidebar-links');
    if(!container || !sidebar) return;

    const linksHTML = darbi.map(item => `<a href="#${item.id}">${item.title}</a>`).join('');
    sidebar.innerHTML = `
      <div class="hl"></div>
      <h2 class="sidebar-title">Cybersecurity</h2>
      <div class="hl2"></div>
      ${linksHTML}
      <div class="vl"></div>
    `;

    container.innerHTML = darbi.map(item => `
      <section id="${item.id}">
        <h2 class="section-title">${item.title}</h2>
        <img src="${item.img}" alt="${item.title}" class="portfolio-img">
        <p class="description">${item.desc}</p>
      </section>
    `).join('');

    setupLightbox();
  }

  function setupLightbox() {
    document.querySelectorAll('.portfolio-img').forEach(image => {
      image.onclick = () => {
        document.getElementById('lightbox').style.display = 'flex';
        document.getElementById('lightbox-img').src = image.src;
      };
    });
  }

  // --- GITHUB API FUNKCIJA ---
  async function saveToGitHub() {
    const token = "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"; // <--- IELIEC SAVU TOKENU NO GITHUB
    const repo = "rikuslv/portfolio"; 
    const path = "portfolio/cyber/cyber.html"; // <--- PĀRBAUDI VAI ŠIS CEĻŠ IR PAREIZS!
    
    const title = document.getElementById('new-title').value;
    const id = document.getElementById('new-id').value;
    const img = document.getElementById('new-img').value;
    const desc = document.getElementById('new-desc').value;
    const status = document.getElementById('status');

    if(!title || !id || !token) { alert("Please fill Title, ID and ensure Token is set!"); return; }

    status.innerText = "Connecting to GitHub...";

    try {
      const response = await fetch(`https://api.github.com/repos/${repo}/contents/${path}`, {
        headers: { "Authorization": `token ${token}` }
      });
      const fileData = await response.json();
      const oldContent = decodeURIComponent(escape(atob(fileData.content)));

      const newItem = `    {
      id: "${id}",
      title: "${title}",
      img: "${img}",
      desc: \`${desc}\`
    },`;

      const newContent = oldContent.replace('const darbi = [', `const darbi = [\n${newItem}`);

      const updateResponse = await fetch(`https://api.github.com/repos/${repo}/contents/${path}`, {
        method: "PUT",
        headers: { 
          "Authorization": `token ${token}`,
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          message: `Added new project: ${title}`,
          content: btoa(unescape(encodeURIComponent(newContent))),
          sha: fileData.sha
        })
      });

      if (updateResponse.ok) {
        status.innerText = "SUCCESS! Refreshing...";
        setTimeout(() => location.reload(), 3000);
      } else {
        status.innerText = "Error. Check token permissions.";
      }
    } catch (err) {
      status.innerText = "Error: " + err.message;
    }
  }

  renderPortfolio();
  // English Comment: Secret access logic
let clickCount = 0;

// English Comment: We wait for the sidebar to be rendered before adding the click listener
function setupSecretAccess() {
  const banditLink = document.querySelector('a[href="#bandit"]');
  
  if (banditLink) {
    banditLink.addEventListener('click', (e) => {
      clickCount++;
      
      if (clickCount === 5) {
        const panel = document.getElementById('admin-panel');
        panel.style.display = 'block';
        
        // English Comment: Scroll to the panel so you see it appeared
        panel.scrollIntoView({ behavior: 'smooth' });
        
        // English Comment: Reset counter
        clickCount = 0;
        alert("Admin mode activated!");
      }
      
      // English Comment: Optional: reset clicks if too much time passes between them
      setTimeout(() => { clickCount = 0; }, 5000); 
    });
  }
}


</script>

</body>
</html>
