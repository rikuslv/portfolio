<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cybersecurity</title>

  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
  <link rel="stylesheet" href="navigation.css?v=99">
  <link rel="stylesheet" href="visual.css">

  <style>
    /* English Comment: Hidden Admin Panel styled as a centered modal */
    #admin-panel {
      display: none; 
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: #1a252f;
      padding: 30px;
      border: 2px solid #00bcd4;
      box-shadow: 0 0 50px rgba(0,0,0,0.8);
      z-index: 10000;
      width: 350px;
    }

    #admin-panel input, #admin-panel textarea {
      display: block;
      width: 100%;
      margin: 10px 0;
      background: #2c3e50;
      border: 1px solid #35495e;
      color: white;
      padding: 10px;
      box-sizing: border-box;
    }

    .close-btn {
      float: right;
      color: #ff4444;
      cursor: pointer;
      font-weight: bold;
    }

    /* English Comment: Overlay to dim background when admin is open */
    #overlay {
      display: none;
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.7);
      z-index: 9999;
    }
  </style>
</head>

<body>

<nav class="navbar">
  <span class="material-symbols-outlined menu-icon" onclick="toggleMenu()">menu</span>
  <div class="nav-links" id="navLinks">
    <a href="../../index.html">Home</a>
    <a href="../portfolio.html">Portfolio</a>
  </div>
</nav>

<div class="tasks" id="sidebar-links">
  <div class="hl"></div>
  <h2 class="sidebar-title">Cybersecurity</h2>
  <div class="hl2"></div>
  <div class="vl"></div>
</div>

<div class="content-container" id="portfolio-root"></div>

<div id="overlay" onclick="closeAdmin()"></div>
<div id="admin-panel">
  <span class="close-btn" onclick="closeAdmin()">X</span>
  <h3 style="color: #00bcd4; margin-top: 0;">Admin Access</h3>
  
  <input type="password" id="gh-token" placeholder="GitHub Personal Token">
  
  <input type="text" id="new-title" placeholder="Project Title">
  <input type="text" id="new-id" placeholder="Project ID (no spaces)">
  <input type="text" id="new-img" placeholder="Image Name (e.g. pic.png)">
  <textarea id="new-desc" placeholder="English Description (HTML ok)"></textarea>
  
  <button onclick="saveToGitHub()" style="width:100%; padding:10px; background:#00bcd4; color:white; border:none; cursor:pointer; font-weight:bold;">Upload to GitHub</button>
  <p id="status" style="color:#00bcd4; font-size:12px; margin-top:10px;"></p>
</div>

<script>
  let clickCount = 0;
  const darbi = [
    {
      id: "bandit",
      title: "Bandit",
      img: "bandit.png",
      desc: `What is a Bandit?<br><br>In this game, I got to <a href="#" target="_blank">level 16</a>.`
    }
  ];

  function renderPortfolio() {
    const container = document.getElementById('portfolio-root');
    const sidebar = document.getElementById('sidebar-links');
    
    // Sidebar links
    const linksHTML = darbi.map(item => `<a href="#${item.id}" class="secret-trigger">${item.title}</a>`).join('');
    sidebar.innerHTML = `<div class="hl"></div><h2 class="sidebar-title">Cybersecurity</h2><div class="hl2"></div>${linksHTML}<div class="vl"></div>`;

    // Content
    container.innerHTML = darbi.map(item => `
      <section id="${item.id}">
        <h2 class="section-title">${item.title}</h2>
        <img src="${item.img}" class="portfolio-img">
        <p class="description">${item.desc}</p>
      </section>
    `).join('');

    // English Comment: Attach the secret 5-click listener to "Bandit" link
    document.querySelectorAll('.secret-trigger').forEach(link => {
      if(link.innerText === "Bandit") {
        link.addEventListener('click', (e) => {
          clickCount++;
          if (clickCount >= 5) {
            document.getElementById('admin-panel').style.display = 'block';
            document.getElementById('overlay').style.display = 'block';
            clickCount = 0;
          }
          // English Comment: Reset clicks after 3 seconds if not fast enough
          setTimeout(() => { clickCount = 0; }, 3000);
        });
      }
    });
  }

  function closeAdmin() {
    document.getElementById('admin-panel').style.display = 'none';
    document.getElementById('overlay').style.display = 'none';
  }

  async function saveToGitHub() {
    const token = document.getElementById('gh-token').value;
    const repo = "TAVS_LIETOTAJVARDS/REPROZITORIJS"; // <-- Nomaini šo!
    const path = "cyber/cyber.html"; // <-- Pārbaudi ceļu!
    
    const title = document.getElementById('new-title').value;
    const id = document.getElementById('new-id').value;
    const img = document.getElementById('new-img').value;
    const desc = document.getElementById('new-desc').value;
    const status = document.getElementById('status');

    if(!token || !title) { status.innerText = "Error: Missing Token or Title"; return; }

    status.innerText = "Pushing to GitHub...";

    try {
      const res = await fetch(`https://api.github.com/repos/${repo}/contents/${path}`, {
        headers: { "Authorization": `token ${token}` }
      });
      const data = await res.json();
      const oldContent = decodeURIComponent(escape(atob(data.content)));

      const newItem = `    {
      id: "${id}",
      title: "${title}",
      img: "${img}",
      desc: \`${desc}\`
    },`;

      const newContent = oldContent.replace('const darbi = [', `const darbi = [\n${newItem}`);

      await fetch(`https://api.github.com/repos/${repo}/contents/${path}`, {
        method: "PUT",
        headers: { "Authorization": `token ${token}`, "Content-Type": "application/json" },
        body: JSON.stringify({
          message: `Added ${title}`,
          content: btoa(unescape(encodeURIComponent(newContent))),
          sha: data.sha
        })
      });

      status.innerText = "Success! Reloading...";
      setTimeout(() => location.reload(), 2000);
    } catch (err) {
      status.innerText = "Error: " + err.message;
    }
  }

  renderPortfolio();
</script>
</body>
</html>
