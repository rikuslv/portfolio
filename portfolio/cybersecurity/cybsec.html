<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cybersecurity</title>

  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
  <link rel="stylesheet" href="navigation.css?v=99">
  <link rel="stylesheet" href="visual.css">
  <link rel="shortcut icon" type="image/x-icon" href="logo.png">

  <style>
    /* Lightbox styles */
    .lightbox {
      display: none;
      position: fixed;
      z-index: 9999;
      top: 0; left: 0; width: 100%; height: 100%;
      background-color: rgba(0, 0, 0, 0.9);
      justify-content: center; align-items: center;
      cursor: zoom-out;
    }
    .lightbox img {
      max-width: 90%; max-height: 90%;
      border: 2px solid #00bcd4;
      box-shadow: 0 0 20px rgba(0, 188, 212, 0.5);
    }
    .portfolio-img { cursor: zoom-in; }

    /* Centered Admin Modal */
    #admin-panel {
      display: none; 
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      background: #1a252f;
      padding: 30px;
      border: 2px solid #00bcd4;
      box-shadow: 0 0 50px rgba(0,0,0,0.9);
      z-index: 10000;
      width: 380px;
      max-width: 90%;
    }
    #admin-panel input, #admin-panel textarea {
      display: block; width: 100%; margin: 12px 0;
      background: #2c3e50; border: 1px solid #35495e;
      color: white; padding: 10px; box-sizing: border-box;
    }
    #overlay {
      display: none;
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.85);
      z-index: 9999;
    }
    .close-btn { float: right; color: #ff4444; cursor: pointer; font-weight: bold; }
  </style>
</head>

<body>

<nav class="navbar">
  <span class="material-symbols-outlined menu-icon" onclick="toggleMenu()">menu</span>
  <div class="nav-links" id="navLinks">
    <a href="../../index.html">Home</a>
    <a href="../../about/about.html">About</a>
    <a href="../../news/news.html">News</a>
    <a href="../portfolio.html">Portfolio</a>
    <a href="../../conntact/conntact.html"">Contact</a>
  </div>
</nav>

<div class="tasks" id="sidebar-links">
  <div class="hl"></div>
  <h2 class="sidebar-title">Cybersecurity</h2>
  <div class="hl2"></div>
  <div class="vl"></div>
</div>

<div class="content-container" id="portfolio-root"></div>

<div id="lightbox" class="lightbox" onclick="this.style.display='none'">
  <img id="lightbox-img" src="" alt="Zoomed view">
</div>

<div id="overlay" onclick="closeAdmin()"></div>
<div id="admin-panel">
  <span class="close-btn" onclick="closeAdmin()">X</span>
  <h3 style="color: #00bcd4; margin-top: 0;">Admin Access</h3>
  <input type="password" id="gh-token" placeholder="GitHub Personal Token">
  <input type="text" id="new-title" placeholder="Project Title">
  <input type="text" id="new-id" placeholder="Project ID (no spaces)">
  <input type="text" id="new-img" placeholder="Image Filename (e.g. test.png)">
  <textarea id="new-desc" placeholder="English Description (HTML allowed)"></textarea>
  <button onclick="saveToGitHub()" style="width:100%; padding:12px; background:#00bcd4; color:white; border:none; cursor:pointer; font-weight:bold;">Upload to GitHub</button>
  <p id="status" style="color:#00bcd4; font-size:12px; margin-top:10px; text-align:center;"></p>
</div>

<script>
  function toggleMenu() {
    document.getElementById("navLinks").classList.toggle("active");
  }

  let clickCount = 0;

  // English Comment: Full data array with all your projects
  const darbi = [
    {
      id: "natas",
      title: "Natas",
      img: "https://imgs.search.brave.com/OcC5arsf-78CupFhkoNv_7Lyvn7C7XOhCcILeyYIxIw/rs:fit:32:32:1:0/g:ce/aHR0cDovL2Zhdmlj/b25zLnNlYXJjaC5i/cmF2ZS5jb20vaWNv/bnMvNTEwZDE0M2Qz/MzFkMmJmMzI0MzY3/YzY5YmRlY2ExOWUy/NGViNzM4YWExMmU1/OGIyZTFlYmY5YjQ5/ODEzNWQxYy9vdmVy/dGhld2lyZS5vcmcv",
      desc: `Natas teaches the basics of serverside web-security.

Each level of natas consists of its own website located at <a href="http://natasX.natas.labs.overthewire.org">natas</a>, where X is the level number. There is no SSH login. To access a level, enter the username for that level (e.g. natas0 for level 0) and its password. (<a href="" target="_blank">report</a>)

`
    },
    {
      id: "bandit",
      title: "Bandit",
      img: "bandit.png",
      desc: `What is a Bandit?<br><br>Bandit is a game that, like most other games, is organized in levels. You start at Level 0 and try to “beat” or “finish” it.<br>Finishing a level results in information on how to start the next level.<br><a href="https://overthewire.org/wargames/bandit/" target="_blank">(Full description).</a><br><br>In this game, I got to <a href="https://docs.google.com/document/d/1jq_MTlrP-0r-AsPq3DgGgPLFU7Yc3fTxr7Q77fCjDSo/edit?usp=sharing" target="_blank">level 16</a>.`
    },
    {
      id: "practice",
      title: "Practice",
      img: "seb.png",
      desc: `I practice in SEB Bank, where I filled practice tasks:<br><br>1. Creation of ICT resources/network infrastructure documentation;<br>2. Familiarization with ICT security architecture and processes;<br>3. Technical tools (firewalls, IPS, IDS, etc.);<br>4. Security policy, usage rules, and related documentation;<br>5. Monitoring user activity;<br>6. Classification of system users;<br>7. Network/system management tools used in the organization.`
    },
    {
      id: "evilbox",
      title: "EVILBOX: ONE",
      img: "evilbox.png",
      desc: `EVILBOX: ONE is a cybersecurity Capture The Flag (CTF) competition platform. In this task, the objective is to obtain both the user flag and the root flag. (<a href="https://drive.google.com/file/d/1FdqM9bw7eqV5HDgHGl1gEvHjP3TdKfkW/view?usp=sharing" target="_blank">report</a>)`
    },
    {
      id: "kiberplesis",
      title: "Kiberplēsis",
      img: "kiberplesis.png",
      desc: `The "Kiberplēsis" competition is organized by CYBER CIRCLE. I achieved 360 points in the Kiberplēsis 2025 CTF competition, placing 80th.`
    },
    {
      id: "jangow",
      title: "Jangow: 1.0.1",
      img: "jangow.png",
      desc: `Jangow: 1.0.1 is a vulnerable virtual machine designed for security testing and learning penetration testing techniques.`
    }
  ];

  function renderPortfolio() {
    const container = document.getElementById('portfolio-root');
    const sidebar = document.getElementById('sidebar-links');
    
    const linksHTML = darbi.map(item => `<a href="#${item.id}" class="secret-trigger">${item.title}</a>`).join('');
    sidebar.innerHTML = `<div class="hl"></div><h2 class="sidebar-title">Cybersecurity</h2><div class="hl2"></div>${linksHTML}<div class="vl"></div>`;

    container.innerHTML = darbi.map(item => `
      <section id="${item.id}">
        <h2 class="section-title">${item.title}</h2>
        <img src="${item.img}" alt="${item.title}" class="portfolio-img">
        <p class="description">${item.desc}</p>
      </section>
    `).join('');

    setupSecretClicks();
    setupLightbox();
  }

  function setupSecretClicks() {
    document.querySelectorAll('.secret-trigger').forEach(link => {
      if(link.innerText === "Bandit") {
        link.addEventListener('click', (e) => {
          clickCount++;
          if (clickCount >= 5) {
            document.getElementById('admin-panel').style.display = 'block';
            document.getElementById('overlay').style.display = 'block';
            clickCount = 0;
          }
          setTimeout(() => { clickCount = 0; }, 3000);
        });
      }
    });
  }

  function closeAdmin() {
    document.getElementById('admin-panel').style.display = 'none';
    document.getElementById('overlay').style.display = 'none';
  }

  function setupLightbox() {
    document.querySelectorAll('.portfolio-img').forEach(image => {
      image.onclick = () => {
        document.getElementById('lightbox').style.display = 'flex';
        document.getElementById('lightbox-img').src = image.src;
      };
    });
  }

  async function saveToGitHub() {
  const token = document.getElementById('gh-token').value;
  const repo = "rikuslv/portfolio"; 
  const path = "portfolio/cybersecurity/cybsec.html";   
  
  const title = document.getElementById('new-title').value;
  const id = document.getElementById('new-id').value;
  const img = document.getElementById('new-img').value;
  const desc = document.getElementById('new-desc').value;
  const status = document.getElementById('status');

  if(!token || !title || !id) { 
    status.innerText = "Error: Missing Token, Title or ID"; 
    return; 
  }

  status.innerText = "Connecting to GitHub...";

  try {
    // 1. Get current file data
    const res = await fetch(`https://api.github.com/repos/${repo}/contents/${path}`, {
      headers: { "Authorization": `token ${token}` }
    });
    
    if (!res.ok) throw new Error("Could not find the file on GitHub. Check 'repo' and 'path' variables.");
    
    const data = await res.json();
    
    // English Comment: Decoding with UTF-8 support to avoid "invalid character" errors
    const oldContent = decodeURIComponent(escape(atob(data.content)));

    // 2. Prepare new item
    const newItem = `    {
      id: "${id}",
      title: "${title}",
      img: "${img}",
      desc: \`${desc}\`
    },`;

    // 3. Insert into the array
    const newContent = oldContent.replace('const darbi = [', `const darbi = [\n${newItem}`);

    // 4. Push back to GitHub
    // English Comment: Encoding with UTF-8 support before sending to btoa()
    const encodedContent = btoa(unescape(encodeURIComponent(newContent)));

    const updateRes = await fetch(`https://api.github.com/repos/${repo}/contents/${path}`, {
      method: "PUT",
      headers: { 
        "Authorization": `token ${token}`,
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        message: `Added project: ${title}`,
        content: encodedContent,
        sha: data.sha
      })
    });

    if (updateRes.ok) {
      status.innerText = "Success! Page will reload in 3s.";
      status.style.color = "#44ff44";
      setTimeout(() => location.reload(), 3000);
    } else {
      const errorData = await updateRes.json();
      status.innerText = "GitHub Error: " + errorData.message;
    }

  } catch (err) {
    status.innerText = "Error: " + err.message;
    console.error(err);
  }
}
  renderPortfolio();
</script>
</body>
</html>
