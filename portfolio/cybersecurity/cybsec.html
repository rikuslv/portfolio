<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cybersecurity</title>

  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
  <link rel="stylesheet" href="navigation.css?v=99">
  <link rel="stylesheet" href="visual.css">
  <link rel="shortcut icon" type="image/x-icon" href="logo.png">

  <style>
    /* Lightbox styles */
    .lightbox {
      display: none;
      position: fixed;
      z-index: 9999;
      top: 0; left: 0; width: 100%; height: 100%;
      background-color: rgba(0, 0, 0, 0.9);
      justify-content: center; align-items: center;
      cursor: zoom-out;
    }
    .lightbox img {
      max-width: 90%; max-height: 90%;
      border: 2px solid #00bcd4;
      box-shadow: 0 0 20px rgba(0, 188, 212, 0.5);
    }
    .portfolio-img { cursor: zoom-in; }

    /* Centered Admin Modal */
    #admin-panel {
      display: none; 
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      background: #1a252f;
      padding: 30px;
      border: 2px solid #00bcd4;
      box-shadow: 0 0 50px rgba(0,0,0,0.9);
      z-index: 10000;
      width: 380px;
      max-width: 90%;
    }
    #admin-panel input, #admin-panel textarea {
      display: block; width: 100%; margin: 12px 0;
      background: #2c3e50; border: 1px solid #35495e;
      color: white; padding: 10px; box-sizing: border-box;
    }
    #overlay {
      display: none;
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.85);
      z-index: 9999;
    }
    .close-btn { float: right; color: #ff4444; cursor: pointer; font-weight: bold; }
  </style>
</head>

<body>

  <button class="translate-link" onclick="toggleLanguage()">
     Latvian
  </button>

<nav class="navbar">
  <span class="material-symbols-outlined menu-icon" onclick="toggleMenu()">menu</span>
  <div class="nav-links" id="navLinks">
    <a href="../../index.html" data-i18="home">Home</a>
    <a href="../../about/about.html" data-i18="about">About</a>
    <a href="../../news/news.html" data-i18="news">News</a>
    <a href="../portfolio.html" data-i18="portfolio">Portfolio</a>
    <a href="../../conntact/conntact.html" data-i18="contact">Contact</a>
  </div>
</nav>

<div class="tasks" id="sidebar-links">
  <div class="hl"></div>
  <h2 class="sidebar-title" data-i18="cybersecurity">Cybersecurity</h2>
  <div class="hl2"></div>
  <div class="vl"></div>
</div>

<div class="content-container" id="portfolio-root"></div>

<div id="lightbox" class="lightbox" onclick="this.style.display='none'">
  <img id="lightbox-img" src="" alt="Zoomed view">
</div>

<div id="overlay" onclick="closeAdmin()"></div>
<div id="admin-panel">
  <span class="close-btn" onclick="closeAdmin()">X</span>
  <h3 style="color: #00bcd4; margin-top: 0;" data-i18="admin-access">Admin Access</h3>
  <input type="password" id="gh-token" placeholder="GitHub Personal Token" data-i18-placeholder="github-token-placeholder">
  <input type="text" id="new-title" placeholder="Project Title" data-i18-placeholder="project-title-placeholder">
  <input type="text" id="new-id" placeholder="Project ID (no spaces)" data-i18-placeholder="project-id-placeholder">
  <input type="text" id="new-img" placeholder="Image Filename (e.g. test.png)" data-i18-placeholder="image-filename-placeholder">
  <textarea id="new-desc" placeholder="English Description (HTML allowed)" data-i18-placeholder="description-placeholder"></textarea>
  <button onclick="saveToGitHub()" style="width:100%; padding:12px; background:#00bcd4; color:white; border:none; cursor:pointer; font-weight:bold;" data-i18="upload-to-github">Upload to GitHub</button>
  <p id="status" style="color:#00bcd4; font-size:12px; margin-top:10px; text-align:center;"></p>
</div>

<script>
  function toggleMenu() {
    document.getElementById("navLinks").classList.toggle("active");
  }

  let clickCount = 0;

  // English Comment: Full data array with all your projects
  const darbi = [
    {
      id: "prakse",
      titleKey: "project-prakse-title",
      descKey: "project-prakse-desc",
      img: "prakse.png"
    },
    {
      id: "natas",
      titleKey: "project-natas-title",
      descKey: "project-natas-desc",
      img: "natas.png"
    },
    {
      id: "bandit",
      titleKey: "project-bandit-title",
      descKey: "project-bandit-desc",
      img: "bandit.png"
    },
    {
      id: "practice",
      titleKey: "project-seb-title",
      descKey: "project-seb-desc",
      img: "seb.png"
    },
    {
      id: "evilbox",
      titleKey: "project-evilbox-title",
      descKey: "project-evilbox-desc",
      img: "evilbox.png"
    },
    {
      id: "kiberplesis",
      titleKey: "project-kiberplesis-title",
      descKey: "project-kiberplesis-desc",
      img: "kiberplesis.png"
    },
    {
      id: "jangow",
      titleKey: "project-jangow-title",
      descKey: "project-jangow-desc",
      img: "jangow.png"
    }
  ];

  function renderPortfolio() {
    const container = document.getElementById('portfolio-root');
    const sidebar = document.getElementById('sidebar-links');
    
    const linksHTML = darbi.map(item => `<a href="#${item.id}" class="secret-trigger" data-id="${item.id}">${translate(item.titleKey)}</a>`).join('');
    sidebar.innerHTML = `<div class="hl"></div><h2 class="sidebar-title" data-i18="cybersecurity">Cybersecurity</h2><div class="hl2"></div>${linksHTML}<div class="vl"></div>`;

    container.innerHTML = darbi.map(item => `
      <section id="${item.id}">
        <h2 class="section-title">${translate(item.titleKey)}</h2>
        <img src="${item.img}" alt="${translate(item.titleKey)}" class="portfolio-img">
        <p class="description">${translate(item.descKey)}</p>
      </section>
    `).join('');

    setupSecretClicks();
    setupLightbox();
  }

  function setupSecretClicks() {
    document.querySelectorAll('.secret-trigger').forEach(link => {
      if(link.getAttribute('data-id') === "bandit") {
        link.addEventListener('click', (e) => {
          clickCount++;
          if (clickCount >= 5) {
            document.getElementById('admin-panel').style.display = 'block';
            document.getElementById('overlay').style.display = 'block';
            clickCount = 0;
          }
          setTimeout(() => { clickCount = 0; }, 3000);
        });
      }
    });
  }

  function closeAdmin() {
    document.getElementById('admin-panel').style.display = 'none';
    document.getElementById('overlay').style.display = 'none';
  }

  function setupLightbox() {
    document.querySelectorAll('.portfolio-img').forEach(image => {
      image.onclick = () => {
        document.getElementById('lightbox').style.display = 'flex';
        document.getElementById('lightbox-img').src = image.src;
      };
    });
  }

  async function saveToGitHub() {
  const token = document.getElementById('gh-token').value;
  const repo = "rikuslv/portfolio"; 
  const path = "portfolio/cybersecurity/cybsec.html";   
  
  const title = document.getElementById('new-title').value;
  const id = document.getElementById('new-id').value;
  const img = document.getElementById('new-img').value;
  const desc = document.getElementById('new-desc').value;
  const status = document.getElementById('status');

  if(!token || !title || !id) { 
    status.innerText = translate("missing-token-title-id"); 
    return; 
  }

  status.innerText = translate("connecting-to-github");

  try {
    // 1. Get current file data
    const res = await fetch(`https://api.github.com/repos/${repo}/contents/${path}`, {
      headers: { "Authorization": `token ${token}` }
    });
    
    if (!res.ok) throw new Error("Could not find the file on GitHub. Check 'repo' and 'path' variables.");
    
    const data = await res.json();
    
    // English Comment: Decoding with UTF-8 support to avoid "invalid character" errors
    const oldContent = decodeURIComponent(escape(atob(data.content)));

    // 2. Prepare new item
    const newItem = `    {
      id: "${id}",
      title: "${title}",
      img: "${img}",
      desc: \`${desc}\`
    },`;

    // 3. Insert into the array
    const newContent = oldContent.replace('const darbi = [', `const darbi = [\n${newItem}`);

    // 4. Push back to GitHub
    // English Comment: Encoding with UTF-8 support before sending to btoa()
    const encodedContent = btoa(unescape(encodeURIComponent(newContent)));

    const updateRes = await fetch(`https://api.github.com/repos/${repo}/contents/${path}`, {
      method: "PUT",
      headers: { 
        "Authorization": `token ${token}`,
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        message: `Added project: ${title}`,
        content: encodedContent,
        sha: data.sha
      })
    });

    if (updateRes.ok) {
      status.innerText = translate("success-reload");
      status.style.color = "#44ff44";
      setTimeout(() => location.reload(), 3000);
    } else {
      const errorData = await updateRes.json();
      status.innerText = translate("github-error") + errorData.message;
    }

  } catch (err) {
    status.innerText = translate("error") + err.message;
    console.error(err);
  }
}
  window.addEventListener('load', () => {
    renderPortfolio();
    updatePageContent();

    const translateButton = document.querySelector('.translate-link');
    if (translateButton) {
      translateButton.addEventListener('touchstart', function(event) {
        event.preventDefault();
        toggleLanguage();
      }, { passive: false });
    }
  });
</script>
  <script src="../../javascript/lan.js"></script>
</html>
