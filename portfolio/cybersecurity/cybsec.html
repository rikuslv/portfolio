<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cybersecurity</title>

  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
  <link rel="stylesheet" href="navigation.css?v=99">
  <link rel="stylesheet" href="visual.css">
  <link rel="shortcut icon" type="image/x-icon" href="logo.png">

  <style>
    /* English Comment: Lightbox styles */
    .lightbox {
      display: none;
      position: fixed;
      z-index: 9999;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0, 0, 0, 0.9);
      justify-content: center;
      align-items: center;
      cursor: zoom-out;
    }
    .lightbox img {
      max-width: 90%;
      max-height: 90%;
      border: 2px solid #00bcd4;
      box-shadow: 0 0 20px rgba(0, 188, 212, 0.5);
    }
    .portfolio-img {
      cursor: zoom-in;
    }
  </style>
</head>

<body>

<nav class="navbar">
  <span class="material-symbols-outlined menu-icon" onclick="toggleMenu()">menu</span>
  <div class="nav-links" id="navLinks">
    <a href="../../index.html">Home</a>
    <a href="../../about/about.html">About</a>
    <a href="../../news/news.html">News</a>
    <a href="../portfolio.html">Portfolio</a>
    <a href="../../contact/contact.html">Contact</a>
  </div>
</nav>

<div class="tasks" id="sidebar-links">
  <div class="hl"></div>
  <h2 class="sidebar-title">Cybersecurity</h2>
  <div class="hl2"></div>
  <div class="vl"></div>
</div>

<div class="content-container" id="portfolio-root">
  </div>

<div id="lightbox" class="lightbox" onclick="this.style.display='none'">
  <img id="lightbox-img" src="" alt="Zoomed view">
</div>

<script>
  function toggleMenu() {
    const navLinks = document.getElementById("navLinks");
    navLinks.classList.toggle("active");
  }

  // English Comment: Data array with your original English descriptions and links.
  const darbi = [
    {
      id: "bandit",
      title: "Bandit",
      img: "bandit.png",
      desc: `What is a Bandit?<br><br>
             Bandit is a game that, like most other games, is organized in levels. You start at Level 0 and try to “beat” or “finish” it.
             <br>Finishing a level results in information on how to start the next level.
             <br><a href="https://overthewire.org/wargames/bandit/" target="_blank">(Full description).</a><br><br>
             In this game, I got to <a href="https://docs.google.com/document/d/1jq_MTlrP-0r-AsPq3DgGgPLFU7Yc3fTxr7Q77fCjDSo/edit?usp=sharing" target="_blank">level 16</a>.`
    },
    {
      id: "practice",
      title: "Practice",
      img: "seb.png",
      desc: `I practice in SEB Bank, where I filled practice tasks:<br><br>
             1. Creation of ICT resources/network infrastructure documentation;<br>
             2. Familiarization with ICT security architecture and processes;<br>
             3. Technical tools (firewalls, IPS, IDS, etc.);<br>
             4. Security policy, usage rules, and related documentation;<br>
             5. Monitoring user activity;<br>
             6. Classification of system users;<br>
             7. Network/system management tools used in the organization.`
    },
    {
      id: "evilbox",
      title: "EVILBOX: ONE",
      img: "evilbox.png",
      desc: `EVILBOX: ONE is a cybersecurity Capture The Flag (CTF) competition platform.
             In this task, the objective is to obtain both the user flag and the root flag.
             (<a href="https://drive.google.com/file/d/1FdqM9bw7eqV5HDgHGl1gEvHjP3TdKfkW/view?usp=sharing" target="_blank">report</a>)`
    },
    {
      id: "kiberplesis",
      title: "Kiberplēsis",
      img: "kiberplesis.png",
      desc: `The "Kiberplēsis" competition is organized by CYBER CIRCLE.
             I achieved 360 points in the Kiberplēsis 2025 CTF competition, placing 80th.`
    },
    {
      id: "jangow",
      title: "Jangow: 1.0.1",
      img: "jangow.png",
      desc: `Jangow: 1.0.1 is a vulnerable virtual machine designed for security testing and learning penetration testing techniques.`
    }
  ];

  function renderPortfolio() {
    const container = document.getElementById('portfolio-root');
    const sidebar = document.getElementById('sidebar-links');
    if(!container || !sidebar) return;

    // Render Sidebar
    const linksHTML = darbi.map(item => `<a href="#${item.id}">${item.title}</a>`).join('');
    sidebar.innerHTML = `
      <div class="hl"></div>
      <h2 class="sidebar-title">Cybersecurity</h2>
      <div class="hl2"></div>
      ${linksHTML}
      <div class="vl"></div>
    `;

    // Render Content
    container.innerHTML = darbi.map(item => `
      <section id="${item.id}">
        <h2 class="section-title">${item.title}</h2>
        <img src="${item.img}" alt="${item.title}" class="portfolio-img">
        <p class="description">
          ${item.desc}
        </p>
      </section>
    `).join('');

    setupLightbox();
  }

  function setupLightbox() {
    document.querySelectorAll('.portfolio-img').forEach(image => {
      image.onclick = () => {
        document.getElementById('lightbox').style.display = 'flex';
        document.getElementById('lightbox-img').src = image.src;
      };
    });
  }

  renderPortfolio();
</script>

</body>
</html>
