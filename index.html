<!doctype html>
<html lang="lv">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Richards Grava</title>

  <link rel="stylesheet" href="navigation.css" />
  <link rel="stylesheet" href="visual.css" />
  <link rel="shortcut icon" type="image/x-icon" href="logo.png" />

  <style>
    /* Esošie stili */
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      font-size: 30px;
      color: #e3e3e3;
      position: absolute;
      top: 20px;
      right: 20px;
    }
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      text-align: center;
      background-color: #121212;
      color: #e3e3e3;
    }
    nav {
      display: flex;
      justify-content: center;
      align-items: center;
      flex-wrap: wrap;
      background: #1f1f1f;
      padding: 10px;
    }
    nav a {
      color: white;
      text-decoration: none;
      margin: 10px;
      font-size: 18px;
    }
    nav a:hover {
      color: #00bcd4;
    }

    /* JAUNS STILS: TULKOŠANAS POGA STŪRĪ */
    #translate-btn {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 1000;
      padding: 10px 15px;
      background-color: #00bcd4; /* Tava zilā krāsa */
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-weight: bold;
      box-shadow: 0px 4px 10px rgba(0,0,0,0.3);
      transition: 0.3s;
    }

    #translate-btn:hover {
      background-color: #008c9e;
      transform: scale(1.05);
    }

    /* Paslēpjam oriģinālo Google elementu, lai tas nerēgojas */
    #google_translate_element {
      display: none;
    }

    h1 {
      margin-top: 60px;
      font-size: 40px;
    }
    .min {
      font-size: 20px;
      color: #bbb;
      margin-bottom: 20px;
    }
    .three-column {
      display: flex;
      justify-content: center;
      align-items: center;
      flex-wrap: wrap;
      gap: 20px;
      padding: 20px;
    }
    .three-column img {
      max-width: 100%;
      height: auto;
      border-radius: 10px;
    }
    
    @media (max-width: 600px) {
      h1 { font-size: 28px; }
      nav a { font-size: 16px; margin: 5px; }
      #translate-btn { top: 10px; right: 10px; padding: 8px 12px; font-size: 12px; }
    }
  </style>
</head>
<body>

  <button id="translate-btn" onclick="openTranslate()">Translate / Tulkot</button>
  <div id="google_translate_element"></div>

  <nav class="navbar">
    <a href="#">Home</a>
    <a href="about/about.html">About Me</a>
    <a href="news/news.html">News</a>
    <a href="portfolio/portfolio.html">Portfolio</a>
    <a href="conntact/conntact.html">Contact</a>
    <div class="animation start-home"></div>
  </nav>

  <div class="three-column">
    <div class="column-left">
        <h1>Richards Grava</h1>
        <div class="min">Cybersecurity | Photographer</div>
    </div>

    <div class="column-center">
        <img src="prg.webp" alt="Programming image">
    </div>

    <div class="column-right">
        <img src="ph.webp" alt="Photography image">
    </div>
  </div>

  <script type="text/javascript">
    function googleTranslateElementInit() {
      new google.translate.TranslateElement({
        pageLanguage: 'en', 
        includedLanguages: 'lv,en',
        layout: google.translate.TranslateElement.InlineLayout.SIMPLE
      }, 'google_translate_element');
    }

    // Funkcija, kas "atver" tulkotāju
    function openTranslate() {
      var googleDiv = document.getElementById('google_translate_element');
      googleDiv.style.display = 'block'; // Parāda izvēlni
      // Pievienojam paziņojumu lietotājam, ja nepieciešams
      console.log("Google Translate aktivizēts.");
    }
  </script>
  <script type="text/javascript" src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>

</body>
</html>
