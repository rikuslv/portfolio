<!doctype html>
<html lang="lv">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Richards Grava</title>

  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
  
  <link rel="stylesheet" href="navigation.css" />
  <link rel="stylesheet" href="visual.css" />
  <link rel="shortcut icon" type="image/x-icon" href="logo.png" />

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      text-align: center;
      background-color: #121212;
      color: #e3e3e3;
    }

    /* Tulkošanas poga stūrī */
    .translate-link {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 2000; /* Augstāks par navigāciju */
      padding: 10px 15px;
      background-color: #00bcd4;
      color: white !important;
      text-decoration: none;
      border-radius: 5px;
      font-weight: bold;
      box-shadow: 0px 4px 10px rgba(0,0,0,0.5);
      transition: 0.3s;
    }

    .translate-link:hover {
      background-color: #008c9e;
      transform: scale(1.05);
    }

    h1 {
      margin-top: 60px;
      font-size: 40px;
    }

    .min {
      font-size: 20px;
      color: #bbb;
      margin-bottom: 20px;
    }

    .three-column {
      display: flex;
      justify-content: center;
      align-items: center;
      flex-wrap: wrap;
      gap: 20px;
      padding: 20px;
    }

    .three-column img {
      max-width: 400px;
      width: 100%;
      height: auto;
      border-radius: 10px;
    }

    /* Mobilie labojumi tulkošanas pogai un tekstam */
    @media (max-width: 700px) {
      h1 { font-size: 28px; }
      .translate-link { 
        top: auto; 
        bottom: 20px; /* Pārvietojam uz apakšu mobilajā versijā, lai netraucē menu */
        right: 20px;
        font-size: 14px;
        padding: 8px 12px;
      }
      .three-column img { max-width: 90%; }
    }
  </style>
</head>
<body>

  <a href="https://translate.google.com/translate?sl=en&tl=lv&u=https://rikuslv.github.io/portfolio/#" 
     target="_blank" 
     rel="noopener noreferrer" 
     class="translate-link">
     Latvian / Latviski
  </a>

  <nav class="navbar">
    <span class="material-symbols-outlined menu-toggle" onclick="toggleMenu()" style="cursor: pointer; color: white;">
      menu
    </span>
<nav class="navbar">
  <span class="material-symbols-outlined menu-toggle" onclick="toggleMenu()">menu</span>

  <div class="nav-links" id="navLinks">
    <a href="#">Home</a>
    <a href="about/about.html">About Me</a>
    <a href="news/news.html">News</a>
    <a href="portfolio/portfolio.html">Portfolio</a>
    <a href="conntact/conntact.html">Contact</a>
  </div>
</nav>

  <div class="three-column">
    <div class="column-left">
        <h1>Richards Grava</h1>
        <div class="min">Cybersecurity | Photographer</div>
    </div>
    <div class="column-center">
        <img src="prg.webp" alt="Programming image">
    </div>
    <div class="column-right">
        <img src="ph.webp" alt="Photography image">
    </div>
  </div>

  <script>
    function toggleMenu() {
      const navLinks = document.getElementById("navLinks");
      // Pārslēdz klasi 'active', kas ir definēta tavā navigation.css
      navLinks.classList.toggle("active");
    }

    // Aizvērt izvēlni, ja uzspiež ārpus tās
    window.onclick = function(event) {
      if (!event.target.matches('.menu-toggle')) {
        var dropdowns = document.getElementsByClassName("nav-links");
        for (var i = 0; i < dropdowns.length; i++) {
          var openDropdown = dropdowns[i];
          if (openDropdown.classList.contains('active')) {
            openDropdown.classList.remove('active');
          }
        }
      }
    }
  </script>

</body>
</html>
