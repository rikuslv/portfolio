<!doctype html>
<html lang="lv">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>News</title>

  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
  <link rel="stylesheet" href="navigation.css">
  <link rel="stylesheet" href="visual.css">
  <link rel="shortcut icon" type="image/x-icon" href="logo.png">

  <style>
    /* English Comment: Centered Admin Modal Styles */
    #admin-panel {
      display: none; 
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      background: #1a252f;
      padding: 30px;
      border: 2px solid #00bcd4;
      box-shadow: 0 0 50px rgba(0,0,0,0.9);
      z-index: 10000;
      width: 380px;
      max-width: 90%;
    }
    #admin-panel input, #admin-panel textarea {
      display: block; width: 100%; margin: 12px 0;
      background: #2c3e50; border: 1px solid #35495e;
      color: white; padding: 10px; box-sizing: border-box;
    }
    #overlay {
      display: none;
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.85);
      z-index: 9999;
    }
    .close-btn { float: right; color: #ff4444; cursor: pointer; font-weight: bold; }
    .title { cursor: pointer; user-select: none; } /* English Comment: Make title clickable */
  </style>
</head>

<body>

  <nav class="navbar">
    <div class="nav-links" id="navLinks">
      <a href="../index.html">Home</a>
      <a href="../about/about.html">About Me</a>
      <a href="#">News</a>
      <a href="../portfolio/portfolio.html">Portfolio</a>
      <a href="../conntact/conntact.html">Contact</a>
    </div>
    <span class="material-symbols-outlined menu-icon" onclick="toggleMenu()">menu</span>
  </nav>

  <h1 class="title" id="secret-trigger">News</h1>

  <div id="news-container">
  <h2 class="newst1">I am looking for an internship.</h2>
  <p class="news1">I understand that the internship will take place for three weeks, starting from June 8 to June 26. The specific tasks for the internship have not yet been defined.</p>
    <div id="news-container">
    /*<h2 class="newst1">nothing</h2>
    <p class="news1">..</p>*/
  </div>
  </div>

  <div id="overlay" onclick="closeAdmin()"></div>
  <div id="admin-panel">
    <span class="close-btn" onclick="closeAdmin()">X</span>
    <h3 style="color: #00bcd4; margin-top: 0;">Admin Access (News)</h3>
    
    <input type="password" id="gh-token" placeholder="GitHub Personal Token">
    <input type="text" id="new-headline" placeholder="News Headline">
    <textarea id="new-content" placeholder="News Content (HTML allowed)"></textarea>
    
    <button onclick="saveNewsToGitHub()" style="width:100%; padding:12px; background:#00bcd4; color:white; border:none; cursor:pointer; font-weight:bold;">Post News</button>
    <p id="status" style="color:#00bcd4; font-size:12px; margin-top:10px; text-align:center;"></p>
  </div>

  <script>
    function toggleMenu() {
      const navLinks = document.getElementById("navLinks");
      navLinks.classList.toggle("active");
    }

    function closeAdmin() {
      document.getElementById('admin-panel').style.display = 'none';
      document.getElementById('overlay').style.display = 'none';
    }

    // English Comment: Secret click logic for the "News" title
    let clickCount = 0;
    document.getElementById('secret-trigger').addEventListener('click', () => {
      clickCount++;
      if (clickCount >= 5) {
        document.getElementById('admin-panel').style.display = 'block';
        document.getElementById('overlay').style.display = 'block';
        clickCount = 0;
      }
      setTimeout(() => { clickCount = 0; }, 3000);
    });

    async function saveNewsToGitHub() {
      const token = document.getElementById('gh-token').value;
      const repo = "rikuslv/portfolio"; 
      const path = "news/news.html"; // English Comment: Ensure this path is correct for your news file
      
      const headline = document.getElementById('new-headline').value;
      const content = document.getElementById('new-content').value;
      const status = document.getElementById('status');

      if(!token || !headline) { status.innerText = "Error: Fill Token and Headline"; return; }
      status.innerText = "Connecting...";

      try {
        const url = `https://api.github.com/repos/${repo}/contents/${path}`;
        const res = await fetch(url, { headers: { "Authorization": `token ${token}` } });
        const data = await res.json();
        
        // English Comment: Correctly decode UTF-8
        const oldContent = decodeURIComponent(escape(atob(data.content)));

        // English Comment: Logic to insert new news at the top of the container
        const newEntry = `\n  <h2 class="newst1">${headline}</h2>\n  <p class="news1">${content.replace(/\n/g, '<br>')}</p>`;
        
        // English Comment: We look for the news-container div to insert data
        const newContent = oldContent.replace('<div id="news-container">', `<div id="news-container">${newEntry}`);

        // English Comment: Safely encode for GitHub
        const encodedContent = btoa(unescape(encodeURIComponent(newContent)));

        const updateRes = await fetch(url, {
          method: "PUT",
          headers: { "Authorization": `token ${token}`, "Content-Type": "application/json" },
          body: JSON.stringify({
            message: `New News: ${headline}`,
            content: encodedContent,
            sha: data.sha
          })
        });

        if (updateRes.ok) {
          status.innerText = "News posted! Reloading...";
          setTimeout(() => location.reload(), 2000);
        } else {
          const errData = await updateRes.json();
          status.innerText = "Error: " + errData.message;
        }
      } catch (err) {
        status.innerText = "Error: " + err.message;
      }
    }
  </script>

</body>
</html>
